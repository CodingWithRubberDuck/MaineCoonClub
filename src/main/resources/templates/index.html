<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>

    <title>Velkommen</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>

    <h1>Maine Coon Klubben</h1>
    <p>Velkommen til vores katteunivers!</p>

        <section class="actions">
            <form action="/authentication/register" method="get">

            </form>

            <form action="/authentication/login" method="get">
                <button type="submit" class="btn">Gå til Log ind</button>

        <img id="indexImage" src="/images/mainecoon-forside.png" alt="Billede af kat">

    </div>

</div>

    <div class="footer">
