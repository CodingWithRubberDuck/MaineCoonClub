<!DOCTYPE html>
<html lang="en"  xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <title>Log Ind</title>

    <link rel="stylesheet" href="/styles.css">
</head>
<body>

<div class="header">
    <h1>Log Ind Side</h1>
</div>

<div class="container">

    <div class="sidebar">
        <a href="/">Start Side</a>
        <a href="/authentication/register">Registrering</a>
        <a href="/authentication/login">Log ind</a>
    </div>

    <div class="content">
        <p>
            Indtast den relevante information, og klik på knappen:

        <form th:action="@{/submit}" method="post" th:object="${member}">
            <label for="email">Indtast email </label><br>
            <input type="email" id="email" th:field="*{email}" placeholder="JegElskerKatte@gmail.com" required><br><br>
            <label for="password">Indtast kodeord </label><br>
            <input type="password" id="password" th:field="*{passwordHash}" required><br><br>
            <button type="submit">Prøv</button>
        </form>
        </p>

    </div>

</div>
<div class="footer">
    &copy; 2026 | All Right Reserved
</div>
</body>
</html>
