<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Velkommen</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>

<div class="header">
    <h1>Maine Coon Klubben</h1>
    <p>Velkommen til vores katteunivers!</p>
</div>

<div class="navbar" th:insert="~{fragments/navbar :: navbar}"></div>

<div class="container">
    <div class="content">
        <div class="center">
            <h2>Din Profil</h2>
        </div>
        <div class="center">
            <p>Her kan du se dine personlige oplysninger</p>
        </div>
        <div class="group">
            <div>
                <strong><h1>Navn:</h1></strong>
                <h3 class="bordered-text" th:text="${name}"></h3>
            </div>
            <div>
                <strong><h1>Email:</h1></strong>
                <h3 class="bordered-text" th:text="${email}"></h3>
            </div>
        </div>
        <div class="group">
            <div>
                <h3>Se listen af dine katte:</h3>
                <form action="" method="">
                    <button type="submit" disabled class="btn">Vis Mine Katte</button>
                </form>
            </div>
            <div>
                <h3>Rediger dine oplysninger i din profil:</h3>

                <form action="" method="">
                    <button type="submit" disabled class="btn">Rediger Min profil</button>
                </form>
            </div>
        </div>
        <div class="center">
            <h3>Afmeld dit medlemskab:</h3>
        </div>
        <div class="center-space-below">
            <form action="/personal/deregister" method="get">
                <button type="submit" class="btn-red">Afmeld Min Profil</button>
            </form>
        </div>
    </div>
</div>



</body>

</html>
